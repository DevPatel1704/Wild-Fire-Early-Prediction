<?xml version="1.0" encoding="UTF-8"?>
<svg width="720" height="625" viewBox="0 0 720 625" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <rect width="720" height="625" fill="white"/>

  <!-- Title -->
  <text x="360" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">WILDFIRE DETECTION — PROJECT METHODOLOGY</text>

  <!-- Column labels -->
  <text x="170" y="44" text-anchor="middle" font-size="9" font-weight="700" fill="#555" letter-spacing="1">PHASE 1 — OFFLINE TRAINING</text>
  <text x="550" y="44" text-anchor="middle" font-size="9" font-weight="700" fill="#555" letter-spacing="1">PHASE 2 — REAL-TIME PIPELINE</text>

  <!-- Vertical separator -->
  <line x1="360" y1="32" x2="360" y2="578" stroke="#ddd" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- ==================== LEFT: TRAINING ==================== -->

  <!-- L1: NFDB Database -->
  <rect x="20" y="52" width="300" height="75" rx="5" fill="#f5f5f5" stroke="#444" stroke-width="1.5"/>
  <rect x="20" y="52" width="5" height="75" rx="2" fill="#444"/>
  <text x="170" y="76" text-anchor="middle" font-size="12" font-weight="700" fill="#111">NFDB Fire Database</text>
  <text x="170" y="93" text-anchor="middle" font-size="10" fill="#444">National Fire Database of Canada</text>
  <text x="170" y="109" text-anchor="middle" font-size="9.5" fill="#666">3.84 Million rows · 2020 – 2022</text>

  <!-- Arrow L1 to L2 -->
  <line x1="170" y1="127" x2="170" y2="148" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="164,144 176,144 170,154" fill="#555"/>

  <!-- L2: Preprocessing -->
  <rect x="20" y="156" width="300" height="75" rx="5" fill="#f5f5f5" stroke="#444" stroke-width="1.5"/>
  <rect x="20" y="156" width="5" height="75" rx="2" fill="#444"/>
  <text x="170" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#111">Data Preprocessing</text>
  <text x="170" y="197" text-anchor="middle" font-size="10" fill="#444">Labeling · Normalization · Scaling</text>
  <text x="170" y="213" text-anchor="middle" font-size="9.5" fill="#666">Fire/non-fire split · Graph edge construction</text>

  <!-- Arrow L2 to L3 -->
  <line x1="170" y1="231" x2="170" y2="252" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="164,248 176,248 170,258" fill="#555"/>

  <!-- L3: Model Training -->
  <rect x="20" y="260" width="300" height="84" rx="5" fill="#e8e8e8" stroke="#111" stroke-width="2"/>
  <rect x="20" y="260" width="5" height="84" rx="2" fill="#111"/>
  <text x="170" y="284" text-anchor="middle" font-size="12" font-weight="700" fill="#111">GAT-LSTM Model Training</text>
  <text x="170" y="301" text-anchor="middle" font-size="10" fill="#333">Graph Attention Network + LSTM</text>
  <text x="170" y="317" text-anchor="middle" font-size="10" fill="#444">240,385 parameters · AUC = 0.9998</text>
  <text x="170" y="333" text-anchor="middle" font-size="9" fill="#777">Trained on real NFDB fire events</text>

  <!-- Connector: L3 right edge → across gap → R4 left edge -->
  <path d="M 320 302 L 344 302 L 344 355 L 396 355" stroke="#666" stroke-width="1.5" stroke-dasharray="5,3" fill="none"/>
  <polygon points="393,349 405,355 393,361" fill="#666"/>
  <text x="310" y="296" font-size="8" fill="#999" font-style="italic">checkpoint</text>

  <!-- ==================== RIGHT: INFERENCE ==================== -->

  <!-- R1: IoT Sensors -->
  <rect x="400" y="52" width="300" height="68" rx="5" fill="#f5f5f5" stroke="#444" stroke-width="1.5"/>
  <rect x="400" y="52" width="5" height="68" rx="2" fill="#444"/>
  <text x="550" y="76" text-anchor="middle" font-size="12" font-weight="700" fill="#111">IoT Sensor Network — 100 Nodes</text>
  <text x="550" y="93" text-anchor="middle" font-size="10" fill="#444">Temp · Humidity · Wind · Smoke · Fire Risk · GPS</text>
  <text x="550" y="109" text-anchor="middle" font-size="9.5" fill="#666">30 s interval → 12,000 messages / hour</text>

  <!-- Arrow R1 to R2 -->
  <line x1="550" y1="120" x2="550" y2="140" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="544,136 556,136 550,146" fill="#555"/>
  <text x="563" y="135" font-size="8.5" fill="#999" font-style="italic">sensor.raw</text>

  <!-- R2: Kafka -->
  <rect x="400" y="148" width="300" height="60" rx="5" fill="#f5f5f5" stroke="#444" stroke-width="1.5"/>
  <rect x="400" y="148" width="5" height="60" rx="2" fill="#444"/>
  <text x="550" y="171" text-anchor="middle" font-size="12" font-weight="700" fill="#111">Apache Kafka — Message Broker</text>
  <text x="550" y="189" text-anchor="middle" font-size="10" fill="#444">Topics: sensor.raw · sensor.aggregated · fire.alerts</text>
  <text x="550" y="204" text-anchor="middle" font-size="9.5" fill="#666">Real-time · fault-tolerant · decoupled</text>

  <!-- Arrow R2 to R3 -->
  <line x1="550" y1="208" x2="550" y2="228" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="544,224 556,224 550,234" fill="#555"/>
  <text x="563" y="223" font-size="8.5" fill="#999" font-style="italic">1-min window</text>

  <!-- R3: Stream Processor -->
  <rect x="400" y="236" width="300" height="60" rx="5" fill="#f5f5f5" stroke="#444" stroke-width="1.5"/>
  <rect x="400" y="236" width="5" height="60" rx="2" fill="#444"/>
  <text x="550" y="259" text-anchor="middle" font-size="12" font-weight="700" fill="#111">Stream Processor</text>
  <text x="550" y="277" text-anchor="middle" font-size="10" fill="#444">Window Aggregation (60 s)</text>
  <text x="550" y="292" text-anchor="middle" font-size="9.5" fill="#666">Feature tensor: [100 nodes x 6 features]</text>

  <!-- Arrow R3 to R4 -->
  <line x1="550" y1="296" x2="550" y2="316" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="544,312 556,312 550,322" fill="#555"/>

  <!-- R4: GAT-LSTM Model -->
  <rect x="400" y="324" width="300" height="72" rx="5" fill="#e8e8e8" stroke="#111" stroke-width="2"/>
  <rect x="400" y="324" width="5" height="72" rx="2" fill="#111"/>
  <text x="550" y="348" text-anchor="middle" font-size="12" font-weight="700" fill="#111">GAT-LSTM Model — Inference</text>
  <text x="550" y="365" text-anchor="middle" font-size="10" fill="#333">Loads pre-trained checkpoint (AUC = 0.9998)</text>
  <text x="550" y="382" text-anchor="middle" font-size="10" fill="#444">Outputs fire risk score per node (0 to 1)</text>

  <!-- Arrow R4 to R5 -->
  <line x1="550" y1="396" x2="550" y2="416" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="544,412 556,412 550,422" fill="#555"/>
  <text x="563" y="411" font-size="8.5" fill="#999" font-style="italic">score >= 0.80</text>

  <!-- R5: Alert Engine -->
  <rect x="400" y="424" width="300" height="60" rx="5" fill="#f5f5f5" stroke="#444" stroke-width="1.5"/>
  <rect x="400" y="424" width="5" height="60" rx="2" fill="#444"/>
  <text x="550" y="447" text-anchor="middle" font-size="12" font-weight="700" fill="#111">Alert Engine</text>
  <text x="550" y="465" text-anchor="middle" font-size="10" fill="#444">HIGH >= 0.80  ·  CRITICAL >= 0.90</text>
  <text x="550" y="480" text-anchor="middle" font-size="9.5" fill="#666">Published to fire.alerts Kafka topic</text>

  <!-- Arrow R5 to R6 -->
  <line x1="550" y1="484" x2="550" y2="504" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="544,500 556,500 550,510" fill="#555"/>

  <!-- R6: Dashboard -->
  <rect x="400" y="512" width="300" height="60" rx="5" fill="#e8e8e8" stroke="#111" stroke-width="2"/>
  <rect x="400" y="512" width="5" height="60" rx="2" fill="#111"/>
  <text x="550" y="535" text-anchor="middle" font-size="12" font-weight="700" fill="#111">FastAPI + React Dashboard</text>
  <text x="550" y="553" text-anchor="middle" font-size="10" fill="#333">Live map · Active alerts · Risk gauge</text>
  <text x="550" y="568" text-anchor="middle" font-size="9.5" fill="#555">Real-time updates · localhost:3000</text>

  <!-- Stats bar -->
  <line x1="20" y1="588" x2="700" y2="588" stroke="#ccc" stroke-width="1"/>
  <text x="110" y="603" text-anchor="middle" font-size="11" font-weight="700" fill="#222">100</text>
  <text x="110" y="616" text-anchor="middle" font-size="8.5" fill="#777">Sensor Nodes</text>
  <text x="230" y="603" text-anchor="middle" font-size="11" font-weight="700" fill="#222">12,000</text>
  <text x="230" y="616" text-anchor="middle" font-size="8.5" fill="#777">Msg / Hour</text>
  <text x="360" y="603" text-anchor="middle" font-size="11" font-weight="700" fill="#222">3.84M</text>
  <text x="360" y="616" text-anchor="middle" font-size="8.5" fill="#777">Training Rows</text>
  <text x="490" y="603" text-anchor="middle" font-size="11" font-weight="700" fill="#222">0.9998</text>
  <text x="490" y="616" text-anchor="middle" font-size="8.5" fill="#777">Model AUC</text>
  <text x="615" y="603" text-anchor="middle" font-size="11" font-weight="700" fill="#222">&lt; 1 min</text>
  <text x="615" y="616" text-anchor="middle" font-size="8.5" fill="#777">Detection Latency</text>

</svg>
